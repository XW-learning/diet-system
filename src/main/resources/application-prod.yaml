# ============================================================
# 生产环境配置
# 激活方式: 设置环境变量 SPRING_PROFILES_ACTIVE=prod
# 敏感信息通过环境变量注入，严禁在此文件中硬编码
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:diet_system}?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    map-underscore-to-camel-case: true

zhipu:
  api-key: ${ZHIPU_API_KEY}
